[run]
# Total number of iterations
maxIter = 1000
# Wheter to run on the GPU or CPU
gpu     = true
# The kernel type to use for Xadvection
kernelImpl  = Hierarchical  
# Size of work groups use in the kernels
workGroupSize = 128
# Outputs a solution.log file to be read with the python notebook
outputSolution = false

[geometry]
nx  = 512 # nb of spatial points
nvx = 512  # nb of speed points
n_fict_dim = 3  # nb of points in the fictive dimension

[discretization]
dt  = 0.001

minRealx  = 0
maxRealx  = 1
minRealVx = -1
maxRealVx = 1